{% extends "layout.html" %}
{% block head %}
  <script type="text/javascript" src="{{ url_for('static', filename = 'plotly-2.24.1.min.js') }}"></script>
  <script type="text/javascript" src="{{ url_for('static', filename = 'outdoors.js') }}"></script>
{% endblock %}
{% block content %}
  <div class="container-fluid content mt-5">
    <div class="row">
      <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom border-danger">
        <h1 class="h2 text-danger">Вулиця</h1>
        <div class="row"></div>
      </div>
    </div>
    <div class="row">
        <div class="col d-flex align-items-center justify-content-center rounded-3 p-1 shadow">
          <div class="right-side">
            <div class="box-topic">Температура</div>
            <div class="number" id="temperature">-</div>
          </div>
        </div>
        <div class="col d-flex align-items-center justify-content-center rounded-3 p-1 shadow">
          <div class="right-side">
            <div class="box-topic">Вологість</div>
            <div class="number" id="humidity">-</div>
          </div>
        </div>
        <div class="col d-flex align-items-center justify-content-center rounded-3 p-1 shadow">
          <div class="right-side">
            <div class="box-topic">Тиск</div>
            <div class="number" id="pressure">-</div>
          </div>
        </div>
    </div>
    <div class="divider py-1 bg-dark"></div>
    <div class="row">
      <div class="col-md-12 col-lg-4">
        <div id="temperature_cmp"></div>
      </div>
      <div class="col-md-12 col-lg-8">
         <div id="history"></div>
      </div>
    </div>
    <div class="row">
      <div class="col d-flex lign-items-center justify-content-center shadow">
        <div class="box-topic">Освітлення:</div>
        <div class="number" id="ambient_light">-</div>
      </div>
      <div class="col d-flex lign-items-center justify-content-center shadow">
        <div class="box-topic">Батарея:</div>
        <div class="number" id="battery">-</div>
      </div>
    </div>
  </div>
{% endblock %}
